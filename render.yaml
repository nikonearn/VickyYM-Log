services:
  - type: web
    name: acctmarket
    runtime: node
    buildCommand: pnpm install --frozen-lockfile --prod=false && pnpm -w run build:prod
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
